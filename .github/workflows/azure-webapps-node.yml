name: WireGuard-Final-Tayeb
on: workflow_dispatch
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Setup WireGuard
        run: |
          docker run -d --name wg --privileged \
          -e PEERS=1 -e PEERDNS=1.1.1.1 \
          -e PUBLIC_KEY="iGkdj+7N+VY2/T8vVXi8u5fCutSFz9Xy1TYnMuC5+EY=" \
          -p 443:51820/udp linuxserver/wireguard
          sleep 10
          docker exec wg cat /config/peer1/peer1.conf
