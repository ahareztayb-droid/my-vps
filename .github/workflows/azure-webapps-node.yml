name: VPS Online
on:
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Connect Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}
          args: --advertise-exit-node
      - name: Keep Alive
        run: |
          echo "VPS is running..."
          sleep 6h
